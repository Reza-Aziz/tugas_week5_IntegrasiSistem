syntax = "proto3";

package ride_hailing;

// ============================================
// MESSAGE DEFINITIONS
// ============================================

// Common Messages
message Coordinate {
  double latitude = 1;
  double longitude = 2;
}

message Location {
  string location_id = 1;
  string name = 2;
  Coordinate coordinate = 3;
}

// Auth Service Messages
message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
  string phone_number = 4;
  string role = 5;
}

message RegisterResponse {
  string user_id = 1;
  string message = 2;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  string user_id = 2;
  string role = 3;
}

// Location Service Messages
message ListLocationsRequest {
  string query = 1;
}

message ListLocationsResponse {
  repeated Location locations = 1;
}

message GetPricingRequest {
  Coordinate pickup_location = 1;
  Coordinate destination_location = 2;
}

message GetPricingResponse {
  double estimated_price = 1;
  string currency = 2;
  double distance_km = 3;
  int32 estimated_duration_minutes = 4;
}

// Ride Service Messages (Client Streaming)
message Waypoint {
  string ride_id = 1;
  Coordinate coordinate = 2;
  int32 sequence_number = 3;
  int64 timestamp = 4;
}

message RideSummary {
  string ride_id = 1;
  double total_distance_km = 2;
  string status = 3;
  double final_price = 4;
}

// Driver Service Messages (Server Streaming)
message TrackingRequest {
  string ride_id = 1;
  string driver_id = 2;
}

message LocationUpdate {
  Coordinate coordinate = 1;
  float heading_degrees = 2;
  float speed_kmh = 3;
  int64 timestamp = 4;
}

// Chat Service Messages (Bidirectional Streaming)
message ChatMessage {
  string ride_id = 1;
  string sender_id = 2;
  string receiver_id = 3;
  string message_body = 4;
  int64 timestamp = 5;
}

// ============================================
// SERVICE DEFINITIONS
// ============================================

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse) {}
  rpc Login(LoginRequest) returns (LoginResponse) {}
}

service LocationService {
  rpc ListLocations(ListLocationsRequest) returns (ListLocationsResponse) {}
  rpc GetPricing(GetPricingRequest) returns (GetPricingResponse) {}
}

service RideService {
  rpc UpdateRideWaypoints(stream Waypoint) returns (RideSummary) {}
}

service DriverService {
  rpc TrackDriver(TrackingRequest) returns (stream LocationUpdate) {}
}

service ChatService {
  rpc StreamChat(stream ChatMessage) returns (stream ChatMessage) {}
}
